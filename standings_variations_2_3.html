<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vantare - Variaciones Glass y Teko</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700;800&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Rajdhani', 'sans-serif'], racing: ['Teko', 'sans-serif'] },
          colors: { vantare: { red: { 400: '#E63946', 500: '#C1121F', 600: '#9B2226' } } }
        }
      }
    }
  </script>
  <style>
    body { background-color: #111; background-image: url('https://images.unsplash.com/photo-1517524285303-d6fc6834b29f?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; color: white; }
    .overlay-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: -1; }

    /* GLASS 1 (2A Deep Glass) */
    .g1-glass { background: linear-gradient(135deg, rgba(15,15,15,0.6) 0%, rgba(5,5,5,0.8) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .g1-row { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }

    /* GLASS 2 (Original Var 2 - Modern F1) */
    .g2-glass { background: rgba(15, 15, 15, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;}
    .g2-row { border-bottom: 1px solid rgba(255, 255, 255, 0.03); background: rgba(0,0,0,0.4); }

    /* TEKO 4 (No Skew, Solo Sombra) */
    .s4-box { box-shadow: 8px 8px 0px rgba(193,18,31,0.5); border: 2px solid #1a1a1a; background: #0a0a0a; }
  </style>
</head>
<body class="p-8 flex flex-col items-center">
  <div class="overlay-bg"></div>
  <h1 class="text-3xl font-display font-bold mb-10 text-white drop-shadow-lg">Familia Glass (G1/G2) y Familia Teko</h1>

  <div class="flex flex-wrap justify-center gap-12 w-full max-w-[1800px]" id="app-container"></div>

  <script>
    const drivers = [
      { pos: 1,  num: '36', team: 'ALPINE', brand: '#0055A4', gap: 'LEADER' },
      { pos: 2,  num: '5',  team: 'PORSCHE PENSKE', brand: '#FFF', gap: '+1.430', text: 'text-black' },
      { pos: 3,  num: '51', team: 'FERRARI AF', brand: '#E32636', gap: '+2.152' },
      { pos: 4,  num: '2',  team: 'CADILLAC RACING', brand: '#F2A900', gap: '+3.880', text: 'text-black' },
      { pos: 5,  num: '8',  team: 'TOYOTA GAZOO', brand: '#FFF', gap: '+4.012', text: 'text-black' },
      { pos: 6,  num: '94', team: 'PEUGEOT', brand: '#00A3E0', gap: '+5.550' },
      { pos: 7,  num: '83', team: 'AF CORSE', brand: '#FFD700', gap: '+6.120', text: 'text-black' },
      { pos: 8,  num: '12', team: 'HERTZ TEAM JOTA', brand: '#C9B074', gap: '+7.400', text: 'text-black' },
      { pos: 9,  num: '6',  team: 'PORSCHE PENSKE', brand: '#FFF', gap: '+8.900', text: 'text-black' },
      { pos: 10, num: '7',  team: 'TOYOTA GAZOO', brand: '#FFF', gap: '+9.250', text: 'text-black' },
      { pos: 11, num: '20', team: 'BMW M TEAM', brand: '#000000', gap: '+11.100', text: 'text-white' },
      { pos: 12, num: '15', team: 'BMW M TEAM', brand: '#000000', gap: '+12.450', text: 'text-white' },
      { pos: 13, num: '63', team: 'LAMBORGHINI', brand: '#78B833', gap: '+14.200', text: 'text-black' },
      { pos: 14, num: '93', team: 'PEUGEOT', brand: '#00A3E0', gap: '+15.550' },
      { pos: 15, num: '3',  team: 'CADILLAC RACING', brand: '#F2A900', gap: '+16.800', text: 'text-black' },
      { pos: 16, num: '99', team: 'PROTON COMP', brand: '#FFF', gap: '+18.000', text: 'text-black' },
      { pos: 17, num: '35', team: 'ALPINE', brand: '#0055A4', gap: '+19.500' },
      { pos: 18, num: '11', team: 'ISOTTA FRASCHINI', brand: '#FF0000', gap: '+21.200' },
      { pos: 19, num: '19', team: 'LAMBORGHINI', brand: '#78B833', gap: '+24.100', text: 'text-black' },
      { pos: 20, num: '38', team: 'HERTZ TEAM JOTA', brand: '#C9B074', gap: '+26.800', text: 'text-black' }
    ];

    function createGlass1() {
      let rows = '';
      drivers.forEach(d => {
        rows += `
          <div class="g1-row rounded-lg flex items-center h-8 px-2 mb-0.5 text-sm">
            <div class="w-6 text-center font-display font-bold">${d.pos}</div>
            <div class="w-1 h-6 rounded-full mx-1" style="background-color: ${d.brand}"></div>
            <div class="w-8 flex justify-center"><span class="bg-white text-black font-bold text-xs px-1.5 py-0.5 rounded-sm">${d.num}</span></div>
            <div class="flex-1 px-2 font-bold tracking-wide truncate">${d.team}</div>
            <div class="text-[10px] font-mono text-gray-300">${d.gap}</div>
          </div>
        `;
      });
      return `<div class="w-[300px] font-sans"><div class="mb-3 text-center text-white/70 font-bold text-xs tracking-widest">G1: DEEP GLASS (2A)</div><div class="g1-glass rounded-xl overflow-hidden p-1"><div class="px-4 py-2 bg-white/5 rounded-lg mb-1 flex justify-between items-center"><div class="font-display font-bold text-lg uppercase tracking-widest">Hypercar</div></div>${rows}</div></div>`;
    }

    function createGlass2() {
      let rows = '';
      drivers.forEach(d => {
        rows += `
          <div class="flex items-center h-8 g2-row hover:bg-white/5 transition-colors text-sm">
            <div class="w-6 text-center font-display font-bold text-white">${d.pos}</div>
            <div class="w-1 h-5 rounded-full mx-1" style="background-color: ${d.brand}"></div>
            <div class="w-8 flex justify-center"><span class="font-display font-bold text-xs px-1.5 py-0.5 rounded-sm" style="background-color: ${d.brand}; color: ${d.text === 'text-black' ? '#000' : '#fff'}">${d.num}</span></div>
            <div class="flex-1 px-2 font-semibold tracking-wide truncate">${d.team}</div>
            <div class="w-14 text-right px-2 text-[10px] font-mono font-medium text-gray-300">${d.gap}</div>
          </div>
        `;
      });
      return `<div class="w-[300px] font-sans"><div class="mb-3 text-center text-white/70 font-bold text-xs tracking-widest">G2: ORIGINAL VAR 2 (F1)</div><div class="g2-glass overflow-hidden"><div class="px-4 py-3 border-b border-white/10 flex justify-between items-center bg-gradient-to-r from-vantare-red-600/40 to-transparent"><div class="font-display font-bold text-lg tracking-wide uppercase">Hypercar</div></div><div class="flex flex-col p-1 gap-px">${rows}</div></div></div>`;
    }

    function createTeko4() {
      let rows = '';
      drivers.forEach(d => {
        rows += `
          <div class="flex items-center bg-[#141414] h-8 border-l-4" style="border-color: ${d.brand}">
            <div class="w-8 text-center text-xl text-gray-500 mt-0.5">${d.pos}</div>
            <div class="w-10 h-6 bg-white flex items-center justify-center mx-1">
              <span class="text-black text-xl font-bold mt-1">${d.num}</span>
            </div>
            <div class="flex-1 px-2 text-xl truncate mt-1">${d.team}</div>
            <div class="px-2 text-lg text-vantare-red-400 mt-0.5">${d.pos === 1 ? 'LDR' : d.gap}</div>
          </div>
        `;
      });
      return `<div class="w-[300px] font-racing uppercase"><div class="mb-3 text-center text-white/70 font-bold text-xs tracking-widest font-sans">T4: TEKO FLAT (NO SKEW, SOLO SOMBRA)</div><div class="s4-box"><div class="bg-vantare-red-600 px-4 py-1 border-b-4 border-vantare-red-950"><div class="text-xl text-white font-bold tracking-wider">HYPERCAR</div></div><div class="flex flex-col p-2 gap-1">${rows}</div></div></div>`;
    }

    document.getElementById('app-container').innerHTML = 
      createGlass1() + createGlass2() + createTeko4();
  </script>
</body>
</html>
